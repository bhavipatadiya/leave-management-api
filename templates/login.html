<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 10px;
    width: 320px;
    box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
    text-align: center;
}

input, button {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
}

button {
    background: green;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background: darkgreen;
}

#tokenBox {
    display: none;
    background: #eee;
    padding: 12px;
    margin-top: 10px;
    word-wrap: break-word;
    font-size: 12px;
    font-weight: bold;
    border-radius: 5px;
}
</style>
</head>

<body>

<div class="container">
<h2>Login</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button id="loginBtn" onclick="login()">Login</button>

<div id="tokenBox"></div>
</div>

<script>
async function login() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    // Check if token already exists
    let savedToken = localStorage.getItem("savedToken");
    let redirectUrl = localStorage.getItem("redirectUrl");

    if (savedToken && redirectUrl) {
        // Redirect to dashboard immediately
        window.location.href = redirectUrl;
        return;
    }

    // Send login request
    const formData = new FormData();
    formData.append("username", username);
    formData.append("password", password);

    const res = await fetch("/login", {
        method: "POST",
        body: formData,
        redirect: "manual"
    });

    // Get redirect URL from headers
    const finalUrl = res.headers.get("location");

    if(finalUrl && finalUrl.includes("token=")){
        const url = new URL(finalUrl, window.location.origin);
        const token = url.searchParams.get("token");

        // Save token and redirect URL in localStorage
        localStorage.setItem("savedToken", token);
        localStorage.setItem("redirectUrl", finalUrl);

        // Show token to user
        const box = document.getElementById("tokenBox");
        box.style.display = "block";
        box.innerHTML = `
            <b>COPY THIS TOKEN:</b><br><br>
            ${token}<br><br>
            Click LOGIN again to continue
        `;

        // Update button text
        document.getElementById("loginBtn").innerText = "Go to Dashboard";
    } else {
        alert("Login failed! Check your credentials.");
    }
}

// Auto-fill token box if token exists
window.addEventListener("DOMContentLoaded", () => {
    const token = localStorage.getItem("savedToken");
    if(token){
        const box = document.getElementById("tokenBox");
        box.style.display = "block";
        box.innerHTML = `
            <b>COPY THIS TOKEN:</b><br><br>
            ${token}<br><br>
            Click LOGIN again to continue
        `;
        document.getElementById("loginBtn").innerText = "Go to Dashboard";
    }
});
</script>

</body>
</html>

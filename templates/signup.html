<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
            width: 300px;
            text-align: center;
        }

        input, select, button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            box-sizing: border-box;
        }

        button {
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: darkblue;
        }

        a {
            display: block;
            margin-top: 10px;
        }
    </style>

   
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <script>
        function hashPassword(form) {
            const passwordInput = form.querySelector('input[name="password"]');
           
            const hashed = CryptoJS.SHA256(passwordInput.value).toString();
            passwordInput.value = hashed; 
            return true; 
    </script>
</head>

<body>
<div class="container">
    <h2>Signup</h2>

    <form action="/signup" method="post" onsubmit="return hashPassword(this)">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <select name="role">
            <option value="employee">Employee</option>
            <option value="manager">Manager</option>
            <option value="admin">Admin</option>
        </select>
        <button type="submit">Signup</button>
    </form>

    <a href="/login-page">Already have account? Login</a>
</div>
</body>
</html>
